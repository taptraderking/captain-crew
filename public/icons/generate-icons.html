<!-- Open this in a browser to generate PNG icons, or use any 🚰 emoji as icon -->
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function draw(id, size) {
  const c = document.getElementById(id).getContext('2d');
  c.fillStyle = '#0EA5E9';
  c.beginPath();
  c.roundRect(0, 0, size, size, size * 0.2);
  c.fill();
  c.font = `${size * 0.52}px serif`;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText('🚰', size/2, size/2 + size*0.04);
}
draw('c192', 192);
draw('c512', 512);
</script>
